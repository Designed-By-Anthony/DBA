name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      NODE_OPTIONS: --max-old-space-size=8192
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        run: npm install -g pnpm@10.12.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint @dba/database
        run: pnpm --filter @dba/database run lint

      - name: Production build (agency-os)
        run: pnpm run build:turbo

  e2e-web-viewer-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      NODE_OPTIONS: --max-old-space-size=8192
      # Avoid Firebase emulators in CI; suite is request-only.
      E2E_NO_FIRESTORE_EMULATOR: "1"
      SKIP_WEBSERVER: "0"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        run: npm install -g pnpm@10.12.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium (with deps)
        run: pnpm --filter agency-os exec playwright install --with-deps chromium

      - name: Web-viewer CI smoke
        run: pnpm --filter agency-os run test:e2e:ci
