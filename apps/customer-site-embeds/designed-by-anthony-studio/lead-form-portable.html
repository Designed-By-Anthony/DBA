<!--
  Designed by Anthony — portable lead form (web studio lane).
  Replace REPLACE_CRM_ORIGIN, REPLACE_AGENCY_ID, REPLACE_TURNSTILE_SITE_KEY.
-->
<div id="dba-portable-lead" data-embed-owner="designed-by-anthony" data-embed-lane="dba_studio">
  <style>
    #dba-portable-lead {
      --brand: #06d6a0;
      font: 15px/1.5 system-ui, sans-serif;
      max-width: 480px;
      padding: 1.25rem;
      border: 1px solid #334155;
      border-radius: 12px;
      background: #0b1220;
      color: #e5e7eb;
    }
    #dba-portable-lead label {
      display: block;
      font-size: 0.78rem;
      margin: 0.35rem 0 0.2rem;
      color: #94a3b8;
    }
    #dba-portable-lead input,
    #dba-portable-lead textarea {
      width: 100%;
      padding: 0.55rem 0.65rem;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #020617;
      color: #f8fafc;
      margin-bottom: 0.5rem;
    }
    #dba-portable-lead button {
      margin-top: 0.5rem;
      padding: 0.65rem 1rem;
      border: 0;
      border-radius: 8px;
      background: var(--brand);
      color: #04120c;
      font-weight: 700;
      cursor: pointer;
    }
    #dba-portable-lead .hp {
      position: absolute;
      left: -200vw;
      height: 0;
      opacity: 0;
    }
  </style>
  <form id="dba-portable-form">
    <input class="hp" type="text" name="_hp" value="" tabindex="-1" autocomplete="off" aria-hidden="true" />
    <label>Your name</label>
    <input name="name" required />
    <label>Work email</label>
    <input name="email" type="email" required />
    <label>Website (optional)</label>
    <input name="website" type="url" placeholder="https://example.com" />
    <label>What do you need?</label>
    <textarea name="message" rows="4" required placeholder="New site, rescue, SEO, hosting…"></textarea>
    <div
      class="cf-turnstile"
      data-sitekey="REPLACE_TURNSTILE_SITE_KEY"
      data-theme="dark"
      data-size="invisible"
      data-appearance="interaction-only"
      data-callback="__dbaPortableTurnstileOk"
      data-error-callback="__dbaPortableTurnstileErr"
    ></div>
    <button type="submit" id="dba-portable-submit">Send to Designed by Anthony</button>
    <p id="dba-portable-status" style="font-size: 0.85rem; color: #94a3b8"></p>
  </form>
</div>
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
<script>
  (function () {
    var CRM = "REPLACE_CRM_ORIGIN/api/lead";
    var AGENCY = "REPLACE_AGENCY_ID";
    var form = document.getElementById("dba-portable-form");
    if (!form) return;
    function send(token) {
      var btn = document.getElementById("dba-portable-submit");
      var st = document.getElementById("dba-portable-status");
      var fd = new FormData(form);
      if (String(fd.get("_hp") || "").trim() !== "") return;
      btn.disabled = true;
      st.textContent = "Sending…";
      var payload = {
        name: String(fd.get("name") || "").trim(),
        email: String(fd.get("email") || "").trim(),
        website: String(fd.get("website") || "").trim() || undefined,
        message: String(fd.get("message") || "").trim(),
        agencyId: AGENCY,
        offer_type: "dba_studio_portable_embed",
        cta_source: "customer_site_embed",
        page_context: "portable_html_dba_studio",
        lead_source: "Portable embed — Designed by Anthony (web studio)",
        page_url: location.href,
        page_title: document.title,
        source_page: location.pathname,
        referrer_url: document.referrer || "",
        source: "customer_site_embed|lane:dba_studio|offer:dba_studio_portable_embed",
        _hp: "",
        cfTurnstileResponse: token || undefined,
      };
      fetch(CRM, {
        method: "POST",
        headers: { "Content-Type": "application/json", Accept: "application/json" },
        body: JSON.stringify(payload),
      })
        .then(function (r) {
          if (!r.ok) throw new Error("HTTP " + r.status);
          st.textContent = "Sent — Anthony will follow up shortly.";
          form.reset();
        })
        .catch(function () {
          st.textContent = "Could not send right now. Email hello@designedbyanthony.com.";
        })
        .finally(function () {
          btn.disabled = false;
          var el = form.querySelector(".cf-turnstile");
          var ts = window.turnstile;
          if (ts && el) try { ts.reset(el); } catch (e) {}
        });
    }
    window.__dbaPortableTurnstileOk = function (token) {
      var cb = form.__dbaPortableNext;
      form.__dbaPortableNext = undefined;
      if (typeof cb === "function") cb(token || "");
    };
    window.__dbaPortableTurnstileErr = function () {
      var cb = form.__dbaPortableNext;
      form.__dbaPortableNext = undefined;
      if (typeof cb === "function") cb("");
    };
    form.addEventListener("submit", function (e) {
      e.preventDefault();
      var st = document.getElementById("dba-portable-status");
      var el = form.querySelector(".cf-turnstile");
      var ts = window.turnstile;
      var siteKey = el && el.getAttribute("data-sitekey");
      if (!siteKey || siteKey.indexOf("REPLACE_") === 0) {
        st.textContent = "Configure Turnstile site key in this embed.";
        return;
      }
      if (!ts || typeof ts.execute !== "function") {
        st.textContent = "Security check did not load. Refresh and try again.";
        return;
      }
      st.textContent = "Verifying…";
      form.__dbaPortableNext = function (token) {
        if (!token) {
          st.textContent = "Security check failed. Refresh and try again.";
          return;
        }
        send(token);
      };
      try {
        ts.execute(el);
      } catch (err) {
        st.textContent = "Security check could not start.";
      }
    });
  })();
</script>
