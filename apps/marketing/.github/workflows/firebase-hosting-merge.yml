# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main

# Use Node.js 24 for JS-based actions (Node 20 deprecated on runners). See:
# https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Validate lockfile JSON
        run: node -e "JSON.parse(require('fs').readFileSync('package-lock.json','utf8')); JSON.parse(require('fs').readFileSync('package.json','utf8'));"
      - name: Install dependencies
        run: npm ci
      - name: Build site
        run: npm run build
        env:
          PUBLIC_API_URL: "https://lighthouse-audit--lighthouse-492701.us-east4.hosted.app"
          PUBLIC_CRM_LEAD_URL: "https://admin.designedbyanthony.com/api/lead"
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      - uses: FirebaseExtended/action-hosting-deploy@v0.10.0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DBA_WEBSITE_PROD }}
          channelId: live
          projectId: dba-website-prod
