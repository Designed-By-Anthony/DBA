# API and lightweight checks (complements Vercel deploys and Cursor Bugbot on PRs).
name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lighthouse-api:
    name: Lighthouse API connectivity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Validate lockfile JSON
        run: node -e "JSON.parse(require('fs').readFileSync('package-lock.json','utf8')); JSON.parse(require('fs').readFileSync('package.json','utf8'));"
      - name: Install dependencies
        run: npm ci
      - name: Astro check
        run: npx astro check
      - name: Playwright API check
        run: npm run test:api
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
          PUBLIC_API_URL: 'https://lighthouse-audit--lighthouse-492701.us-east4.hosted.app'
      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps
      - name: Smoke + lead-source E2E (build + preview)
        run: npx playwright test --project=smoke
