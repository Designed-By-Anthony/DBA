# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on PR
on: pull_request

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Validate lockfile JSON
        run: node -e "JSON.parse(require('fs').readFileSync('package-lock.json','utf8')); JSON.parse(require('fs').readFileSync('package.json','utf8'));"
      - name: Install dependencies
        run: npm ci
      - name: Build site
        run: npm run build
        env:
          PUBLIC_API_URL: "https://lighthouse-audit--lighthouse-492701.us-east4.hosted.app"
          PUBLIC_CRM_LEAD_URL: "https://viewer.designedbyanthony.com/api/lead"
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      - uses: FirebaseExtended/action-hosting-deploy@v0.10.0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DBA_WEBSITE_PROD }}
          projectId: dba-website-prod
