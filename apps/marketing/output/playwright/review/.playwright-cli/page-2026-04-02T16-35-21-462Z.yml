    - generic [ref=e49]:
      - generic [ref=e50]:
        - paragraph [ref=e51]: What This Includes
        - heading "How we get your business found on Google" [level=2] [ref=e52]
        - paragraph [ref=e53]: Local SEO works best when the website, the business profile, and the service-area strategy all support the same message.
      - generic [ref=e54]:
        - article [ref=e55]:
          - heading "Helping Google understand your business" [level=3] [ref=e56]
          - paragraph [ref=e57]: We add behind-the-scenes structure that tells Google exactly what your business does, what services you offer, and where you are located. This makes it easier for the right people to find you.
          - heading "Clear structure beats vague marketing copy" [level=4] [ref=e58]
          - paragraph [ref=e59]: Search visibility improves when the site clearly explains your services, service areas, and supporting details instead of trying to say everything on one page.
          - heading "Schema fills in the details machines need" [level=5] [ref=e60]
          - paragraph [ref=e61]: Structured data helps search engines connect your business entity, service pages, and location coverage without guessing.
        - article [ref=e62]:
          - heading "Making your Google listing work harder" [level=3] [ref=e63]
          - paragraph [ref=e64]: Your Google Business Profile needs to match your website. We make sure your business name, address, phone number, services, and categories line up so Google shows you to the right searchers.
          - heading "Consistency protects trust and rankings" [level=4] [ref=e65]
          - paragraph [ref=e66]: If your site says one thing and your Google profile says another, the market notices and search engines do too. Alignment makes the business feel more established.
          - heading "The site and profile should reinforce each other" [level=5] [ref=e67]
          - paragraph [ref=e68]: The best local SEO setups use the website to deepen credibility and the profile to win visibility, not treat them like separate marketing channels.
        - article [ref=e69]:
          - heading "Pages built around what you do and where you do it" [level=3] [ref=e70]
          - paragraph [ref=e71]: We build dedicated pages for each service you offer and each area you serve. That way, when someone searches for a plumber in Rome or a roofer in Utica, your page has a clearer chance to show up.
          - heading "Separate intent deserves separate pages" [level=4] [ref=e72]
          - paragraph [ref=e73]: A broad catch-all page usually underperforms because it does not feel specific enough for the user or the search engine. Focused pages create better relevance.
          - heading "Internal linking turns pages into a system" [level=5] [ref=e74]
          - paragraph [ref=e75]: When service pages and location pages are planned together, they strengthen each other instead of competing for the same vague keywords.
        - article [ref=e76]:
          - heading "Why the work has to continue monthly" [level=3] [ref=e77]
          - paragraph [ref=e78]: Local SEO is not a switch you flip once. Hours change, services expand, reviews come in, competitors publish new pages, and Google keeps comparing how complete and useful each business looks.
          - paragraph [ref=e79]: That is why the monthly work matters. It keeps the Google Business Profile current, keeps the website supporting the profile, and keeps the business adding signals that feel active and trustworthy instead of stale.
          - heading "Directories are part of the foundation, not the whole strategy" [level=4] [ref=e80]
          - paragraph [ref=e81]: Citation consistency still matters, but it is not the whole monthly package. We treat citation cleanup as setup work first, then light maintenance inside the retainer so the core business info stays aligned.
          - heading "Monthly SEO should create visible business assets" [level=5] [ref=e82]
          - paragraph [ref=e83]: "A healthy retainer should produce updates you can point to: profile improvements, review support, service pages, location pages, or offer pages that make the business stronger over time."
      - generic [ref=e84]:
        - paragraph [ref=e85]: Sources
