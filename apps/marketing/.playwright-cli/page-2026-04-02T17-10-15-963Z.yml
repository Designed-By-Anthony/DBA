    - generic [ref=e49]:
      - generic [ref=e50]:
        - paragraph [ref=e51]: What This Includes
        - heading "Why a custom-built site gets better results" [level=2] [ref=e52]
        - paragraph [ref=e53]: A custom site is not about bells and whistles. It is about making the page feel trustworthy, loading fast, and making the next step obvious.
      - generic [ref=e54]:
        - article [ref=e55]:
          - heading "Fast load times that keep visitors on your page" [level=3] [ref=e56]
          - paragraph [ref=e57]: Your site loads in under a second instead of 3 to 5 seconds like most template sites. Faster sites keep visitors around longer and make it easier for the page to earn trust before someone bounces back to Google.
          - heading "What faster load times change" [level=4] [ref=e58]
          - paragraph [ref=e59]: Speed affects how polished your business feels. When a page responds immediately, the experience feels organized, current, and dependable before the visitor has even read the full pitch.
          - heading "Why that matters on a phone" [level=5] [ref=e60]
          - paragraph [ref=e61]: Most searches for service businesses happen on mobile. A fast mobile-first build protects your first impression where buyers are most impatient.
        - article [ref=e62]:
          - heading "Designed around your customers, not a generic template" [level=3] [ref=e63]
          - paragraph [ref=e64]: A template has to work for a wide range of industries. Your site does not. We design the structure, messaging, and calls to action around your actual customers, your real objections, and the way your business earns trust.
          - paragraph [ref=e65]: You give us the topics and ideas, and Anthony writes the copy so the page sounds like a business owner talking to real buyers instead of a drag-and-drop template trying to sound professional.
          - heading "Copy written around real objections" [level=4] [ref=e66]
          - paragraph [ref=e67]: "Instead of filler sections, we focus on the questions that stop people from calling: whether you are reliable, what you actually do, and why they should trust you over the next option in the search results."
          - heading "Clear next steps beat clever design" [level=5] [ref=e68]
          - paragraph [ref=e69]: The goal is not to look artistic for other designers. The goal is to make it obvious what the visitor should do next and make them feel good about doing it.
        - article [ref=e70]:
          - heading "Built to show up on Google" [level=3] [ref=e71]
          - paragraph [ref=e72]: We build SEO into the site from day one with clear page structure, proper headings, strong internal linking, and the technical setup that helps Google understand what your business does and where you operate.
          - heading "Structure helps search engines and customers" [level=4] [ref=e73]
          - paragraph [ref=e74]: A clean page hierarchy makes the site easier to read, easier to crawl, and easier to expand later when you add new services or location pages.
          - heading "Service pages and location pages work together" [level=5] [ref=e75]
          - paragraph [ref=e76]: When the site is built the right way, your core service pages support local visibility instead of competing with it. That gives you a stronger foundation for long-term SEO.
      - generic [ref=e77]:
        - paragraph [ref=e78]: Sources
        - heading "Why We Say This" [level=3] [ref=e79]
        - paragraph [ref=e80]: Here is the documentation behind the approach we use.
