<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline · VertaFlow</title>
  <meta name="robots" content="noindex,nofollow" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #07090e;
      --surface: #0f141f;
      --text: #eaf3f1;
      --muted: #9db2b4;
      --brand: #06d6a0;
      --border: #202735;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 1.25rem;
    }
    .card {
      width: min(560px, 100%);
      border: 1px solid var(--border);
      background: linear-gradient(180deg, #10182a 0%, var(--surface) 100%);
      border-radius: 18px;
      padding: 1.5rem;
      box-shadow: 0 20px 50px -24px rgba(0,0,0,.55);
    }
    h1 {
      margin: 0 0 .75rem;
      font-size: 1.6rem;
      line-height: 1.2;
    }
    p {
      margin: 0 0 1rem;
      color: var(--muted);
      line-height: 1.55;
    }
    .btn {
      border: 0;
      border-radius: 999px;
      background: var(--brand);
      color: #03251d;
      font-weight: 700;
      cursor: pointer;
      padding: .7rem 1.1rem;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>You are offline.</h1>
    <p>
      VertaFlow cached this experience so you can keep working. Any pending lead or estimate
      changes stay local and auto-sync when connectivity returns.
    </p>
    <button class="btn" type="button" onclick="location.reload()">Try again</button>
  </main>
</body>
</html>
