<!--
  VertaFlow CRM — Embeddable Lead Capture Form
  Drop this snippet into any website (Wix, Duda, WordPress, Squarespace, etc.)
  Leads are sent directly to your VertaFlow CRM dashboard.

  Usage:
    1. Copy everything below into an HTML embed block on your site
    2. Replace YOUR_TENANT_ID with your VertaFlow tenant ID (found in Settings → API)
    3. Customize colors by editing the CSS variables in the <style> block

  Powered by VertaFlow — https://vertaflow.io
-->

<div id="vf-lead-form" data-vertaflow-form="lead-capture" data-vertaflow-version="1.0.0">
  <style>
    #vf-lead-form {
      --vf-brand: #06d6a0;
      --vf-brand-hover: #3dffc5;
      --vf-brand-glow: rgba(6,214,160,.25);
      --vf-bg: #0D1117;
      --vf-surface: #161B22;
      --vf-border: rgba(255,255,255,.08);
      --vf-text: #F0F6FC;
      --vf-text-dim: #8B949E;
      --vf-text-muted: #6E7681;
      --vf-radius: 10px;
      --vf-font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;

      font-family: var(--vf-font);
      max-width: 480px;
      margin: 0 auto;
      padding: 2rem;
      background: var(--vf-bg);
      border-radius: 16px;
      border: 1px solid var(--vf-border);
      box-sizing: border-box;
    }
    #vf-lead-form *, #vf-lead-form *::before, #vf-lead-form *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    #vf-lead-form .vf-form-title {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--vf-text);
      margin-bottom: .35rem;
      line-height: 1.3;
    }
    #vf-lead-form .vf-form-subtitle {
      font-size: .88rem;
      color: var(--vf-text-dim);
      margin-bottom: 1.5rem;
      line-height: 1.6;
    }
    #vf-lead-form .vf-field {
      display: flex;
      flex-direction: column;
      gap: .35rem;
      margin-bottom: .85rem;
    }
    #vf-lead-form .vf-row {
      display: flex;
      gap: .75rem;
    }
    #vf-lead-form .vf-row .vf-field { flex: 1; }
    #vf-lead-form label {
      font-size: .78rem;
      font-weight: 600;
      color: var(--vf-text-dim);
      letter-spacing: .03em;
    }
    #vf-lead-form input,
    #vf-lead-form select,
    #vf-lead-form textarea {
      width: 100%;
      padding: .75rem .85rem;
      border-radius: var(--vf-radius);
      border: 1px solid var(--vf-border);
      background: var(--vf-surface);
      color: var(--vf-text);
      font-size: .9rem;
      font-family: var(--vf-font);
      transition: border-color .2s, box-shadow .2s;
      outline: none;
    }
    #vf-lead-form input:focus,
    #vf-lead-form select:focus,
    #vf-lead-form textarea:focus {
      border-color: var(--vf-brand);
      box-shadow: 0 0 0 3px var(--vf-brand-glow);
    }
    #vf-lead-form input::placeholder,
    #vf-lead-form textarea::placeholder {
      color: var(--vf-text-muted);
    }
    #vf-lead-form select {
      appearance: none;
      cursor: pointer;
    }
    #vf-lead-form select option {
      background: var(--vf-surface);
    }
    #vf-lead-form textarea {
      min-height: 80px;
      resize: vertical;
    }
    #vf-lead-form .vf-checkbox {
      display: flex;
      align-items: flex-start;
      gap: .5rem;
      margin: .75rem 0;
      cursor: pointer;
      font-size: .82rem;
      color: var(--vf-text-dim);
    }
    #vf-lead-form .vf-checkbox input[type="checkbox"] {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      accent-color: var(--vf-brand);
      margin-top: 2px;
    }
    #vf-lead-form .vf-submit {
      width: 100%;
      padding: .85rem;
      border: none;
      border-radius: 999px;
      background: var(--vf-brand);
      color: #07090E;
      font-size: .95rem;
      font-weight: 700;
      font-family: var(--vf-font);
      cursor: pointer;
      transition: all .25s;
      margin-top: .5rem;
    }
    #vf-lead-form .vf-submit:hover {
      background: var(--vf-brand-hover);
      box-shadow: 0 0 0 4px var(--vf-brand-glow);
      transform: translateY(-1px);
    }
    #vf-lead-form .vf-submit:disabled {
      opacity: .6;
      cursor: not-allowed;
      transform: none;
    }
    #vf-lead-form .vf-powered {
      text-align: center;
      margin-top: 1rem;
      font-size: .72rem;
      color: var(--vf-text-muted);
    }
    #vf-lead-form .vf-powered a {
      color: var(--vf-brand);
      text-decoration: none;
      font-weight: 600;
    }
    #vf-lead-form .vf-success {
      text-align: center;
      padding: 2rem 0;
    }
    #vf-lead-form .vf-success h3 {
      color: var(--vf-text);
      font-size: 1.2rem;
      margin: .75rem 0 .35rem;
    }
    #vf-lead-form .vf-success p {
      color: var(--vf-text-dim);
      font-size: .9rem;
    }
    /* Light theme override — add class="vf-light" to #vf-lead-form */
    #vf-lead-form.vf-light {
      --vf-bg: #ffffff;
      --vf-surface: #f6f8fa;
      --vf-border: rgba(0,0,0,.1);
      --vf-text: #1a1a2e;
      --vf-text-dim: #57606a;
      --vf-text-muted: #8b949e;
    }
    @media (max-width: 500px) {
      #vf-lead-form .vf-row { flex-direction: column; gap: 0; }
      #vf-lead-form { padding: 1.25rem; }
    }
  </style>

  <form id="vf-form-el" data-crm="vertaflow" data-form-type="lead-capture">
    <h2 class="vf-form-title">Get in touch</h2>
    <p class="vf-form-subtitle">We'll get back to you within one business day.</p>

    <div class="vf-row">
      <div class="vf-field">
        <label for="vf-name">Name</label>
        <input type="text" id="vf-name" name="name" placeholder="Jane Smith" required>
      </div>
      <div class="vf-field">
        <label for="vf-email">Email</label>
        <input type="email" id="vf-email" name="email" placeholder="jane@company.com" required>
      </div>
    </div>

    <div class="vf-row">
      <div class="vf-field">
        <label for="vf-phone">Phone <span style="font-weight:400">(optional)</span></label>
        <input type="tel" id="vf-phone" name="phone" placeholder="(555) 123-4567">
      </div>
      <div class="vf-field">
        <label for="vf-company">Business</label>
        <input type="text" id="vf-company" name="company" placeholder="Company name">
      </div>
    </div>

    <div class="vf-field">
      <label for="vf-service">What do you need?</label>
      <select id="vf-service" name="service">
        <option value="" disabled selected>Select a service</option>
        <option value="web-design">Web Design & Development</option>
        <option value="crm-setup">CRM Setup (VertaFlow)</option>
        <option value="seo">SEO & Marketing</option>
        <option value="branding">Branding & Identity</option>
        <option value="consulting">Consulting</option>
        <option value="other">Other</option>
      </select>
    </div>

    <div class="vf-field">
      <label for="vf-message">Message <span style="font-weight:400">(optional)</span></label>
      <textarea id="vf-message" name="message" placeholder="Tell us about your project..."></textarea>
    </div>

    <label class="vf-checkbox">
      <input type="checkbox" name="webDesignInterest" value="yes">
      <span>I'm also interested in professional web design services from <a href="https://designedbyanthony.com" target="_blank" rel="noopener" style="color:var(--vf-brand)">Designed by Anthony</a></span>
    </label>

    <button type="submit" class="vf-submit" id="vf-submit-btn">Send Message</button>

    <div class="vf-powered">
      Powered by <a href="https://vertaflow.io" target="_blank" rel="noopener">VertaFlow CRM</a>
    </div>
  </form>

  <div class="vf-success" id="vf-success" hidden>
    <div style="font-size:2.5rem;">✅</div>
    <h3>Message sent!</h3>
    <p>We'll be in touch shortly.</p>
  </div>

  <script>
    (() => {
      var form = document.getElementById('vf-form-el');
      if (!form) return;

      // CONFIGURE: Agency OS host + public lead route (browser-safe; no webhook secret).
      var CRM_ENDPOINT = 'https://admin.vertaflow.io/api/lead';

      form.addEventListener('submit', (e) => {
        e.preventDefault();
        var btn = document.getElementById('vf-submit-btn');
        var fd = new FormData(form);

        var payload = {
          name: fd.get('name') || '',
          email: fd.get('email') || '',
          phone: fd.get('phone') || '',
          company: fd.get('company') || '',
          message: [
            fd.get('message') || '',
            'service=' + (fd.get('service') || ''),
            'webDesignInterest=' + (fd.get('webDesignInterest') === 'yes' ? 'yes' : 'no'),
          ].filter(Boolean).join(' | '),
          source: 'embed|hostname:' + window.location.hostname + '|lane:vertaflow_embed',
          agencyId: 'REPLACE_CLERK_ORG_FOR_VERTAFLOW_MASTER',
          offer_type: 'vertaflow_embed_lead_form',
          cta_source: 'third_party_site_embed',
          page_context: 'vertaflow_embed_html',
          lead_source: 'VertaFlow embeddable lead form',
          page_url: location.href,
          page_title: document.title,
          source_page: location.pathname,
          referrer_url: document.referrer || '',
          _hp: '',
          formVersion: '1.1.0'
        };

        btn.disabled = true;
        btn.textContent = 'Sending...';

        fetch(CRM_ENDPOINT, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        })
        .then((res) => {
          if (!res.ok) throw new Error('HTTP ' + res.status);
          form.hidden = true;
          document.getElementById('vf-success').hidden = false;
        })
        .catch(() => {
          form.hidden = true;
          document.getElementById('vf-success').hidden = false;
        });
      });
    })();
  </script>
</div>
