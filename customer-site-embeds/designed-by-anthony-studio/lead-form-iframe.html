<!--
  Designed by Anthony — portable lead form (iFrame version).
  Replace REPLACE_AGENCY_ID with your actual agency ID.
-->
<div id="dba-portable-lead-wrapper" style="max-width: 480px; width: 100%; margin: 0 auto;">
  <iframe
    id="dba-lead-frame"
    src="https://admin.vertaflow.io/embed/lead-form?agency=REPLACE_AGENCY_ID&lane=dba_studio"
    style="width: 100%; border: none; overflow: hidden; background: transparent; min-height: 500px;"
    scrolling="no"
    title="Designed by Anthony Lead Form"
  ></iframe>
</div>

<script>
  (function() {
    window.addEventListener("message", function(e) {
      // Security: Ensure the message comes from your CRM
      if (e.origin !== "https://admin.vertaflow.io") return;

      try {
        var data = JSON.parse(e.data);
        if (data.type === "dba-resize" && data.height) {
          var iframe = document.getElementById("dba-lead-frame");
          if (iframe) {
            // Add a small buffer to prevent scrollbars during rapid resizing
            iframe.style.height = (data.height + 10) + "px";
          }
        }
      } catch(err) {
        // Ignore JSON parse errors from other extensions/scripts
      }
    });
  })();
</script>
